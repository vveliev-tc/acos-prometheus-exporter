# Example of a configuration file for ASOC prometheus exporter
---
hosts:
  <host_ip goes here>:
    username: <uname goes here>
    password: <pwd goes here>
log:
  log_output: "file" # Options: "STDOUT", "journald", "file"
  log_level: "DEBUG"
  log_filename: "/var/log/acos_exporter.log" # Only used if log_output is "FILE"
